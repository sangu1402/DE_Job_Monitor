name: Workday Job Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:        # Manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv schedule plyer feedparser python-dateutil

      - name: Restore seen jobs
        uses: actions/cache@v4
        with:
          path: workday_seen_jobs.json
          key: workday-seen-${{ github.run_id }}
          restore-keys: workday-seen-

      - name: Test Workday API directly
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{"appliedFacets":{},"limit":5,"offset":0,"searchText":"data engineer"}' \
            "https://walmart.wd5.myworkdayjobs.com/wday/cxs/walmart/WalmartExternal/jobs"
          echo ""
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"appliedFacets":{},"limit":5,"offset":0,"searchText":"data engineer"}' \
            "https://walmart.wd5.myworkdayjobs.com/wday/cxs/walmart/WalmartExternal/jobs" | head -c 200
          echo ""

      - name: Run Workday Monitor
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: python workday_monitor.py --once

      - name: Save seen jobs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workday-seen-jobs
          path: workday_seen_jobs.json
          retention-days: 30

      - name: Commit seen jobs
        if: always()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add workday_seen_jobs.json || true
          git diff --staged --quiet || git commit -m "Update workday seen jobs [skip ci]"
          git push || true
